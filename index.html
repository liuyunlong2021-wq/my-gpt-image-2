<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-i18n="siteTitle">搭子提示词库</title>
  <meta name="description" content="参考图与参考视频 + 可复制提示词，一站浏览、一键复制，去韭菜盒子创作。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🎨%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

<header>
  <nav class="container">
    <a href="https://jiucaihezi.studio/" class="logo" title="回主站">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 100 60" fill="none">
        <path d="M10 50C10 50 10 10 50 10C90 10 90 50 90 50" stroke="#7c5cff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M10 50C12 47 15 47 17 50C19 53 22 53 24 50C26 47 29 47 31 50C33 53 36 53 38 50C40 47 43 47 45 50C47 53 50 53 52 50C54 47 57 47 59 50C61 53 64 53 66 50C68 47 71 47 73 50C75 53 78 53 80 50C82 47 85 47 87 50C89 53 90 53 90 50" stroke="#7c5cff" stroke-width="6" stroke-linecap="round"/>
      </svg>
      <span data-i18n="logoText">提示词</span>
    </a>
    <div class="nav-links">
      <a href="#gallery-section" data-i18n="navGallery">画廊</a>
      <a href="https://github.com/EvoLinkAI/awesome-gpt-image-2-API-and-Prompts" target="_blank" rel="noopener noreferrer" data-i18n="navGithub">GitHub</a>
      <div class="lang-switch">
        <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
      </div>
    </div>
  </nav>
</header>

<main>
  <section class="hero">
    <div class="container">
      <h1><span data-i18n="heroBrand">搭子</span> <em data-i18n="heroTitle">提示词库</em></h1>
      <p data-i18n="heroDesc">参考图 / 参考视频 + 提示词，一站浏览、一键复制，去韭菜盒子创作</p>
      <a class="hero-cta" href="https://jiucaihezi.studio/" data-i18n="heroCta">去韭菜盒子创作 →</a>
      <div class="hero-stats">
        <div class="stat">
          <div class="stat-num" id="heroStatPrompts">--</div>
          <div class="stat-label" data-i18n="statPrompts">提示词</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="heroStatModels">5</div>
          <div class="stat-label" data-i18n="statModels">模型</div>
        </div>
        <div class="stat">
          <div class="stat-num" id="heroStatMedia">--</div>
          <div class="stat-label" data-i18n="statMedia">参考图/视频</div>
        </div>
      </div>
    </div>
  </section>

  <section id="gallery-section" class="container">
    <div id="modelBar" class="model-bar"></div>
    <div id="typeBar" class="type-bar">
      <button class="type-btn active" data-type="all" data-i18n="typeAll">全部</button>
      <button class="type-btn" data-type="image" data-i18n="typeImage">🖼 图片</button>
      <button class="type-btn" data-type="video" data-i18n="typeVideo">🎬 视频</button>
    </div>

    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="searchInput" type="text" data-i18n-placeholder="searchPlaceholder" placeholder="搜索提示词、分类、作者..." autocomplete="off" />
    </div>

    <div id="categoryBar" class="category-bar"></div>

    <div class="gallery-header">
      <span class="result-count" id="resultCount"></span>
      <span class="sync-hint" data-i18n="syncHint">数据每周自动同步</span>
    </div>
    <div id="gallery" class="gallery"></div>
    <div class="load-more-wrap">
      <button id="loadMore" class="load-more-btn" style="display:none;" data-i18n="loadMore">加载更多</button>
    </div>
  </section>
</main>

<footer>
  <div class="container">
    <p>
      <span data-i18n="footerMain">由搭子工作室聚合整理 · 数据来自社区贡献 ·</span>
      <a href="https://jiucaihezi.studio/" data-i18n="footerStudio">韭菜盒子</a>
      <span data-i18n="footerStudioSuffix">创作主站</span>
    </p>
    <p class="footer-sub" data-i18n="footerSub">无生成能力 · 仅展示 + 复制引流</p>
  </div>
</footer>

<div id="modalOverlay" class="modal-overlay">
  <div class="modal">
    <button id="closeModal" class="modal-close" aria-label="Close">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
